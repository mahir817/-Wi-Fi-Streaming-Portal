<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ filename }} - Local Cinema</title>
    <!-- Google Fonts for typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="player-body fade-in">
    <div class="background-cinematic player-bg"></div>
    
    <!-- Top Navigation for Player -->
    <nav class="player-nav">
        <a href="/" class="back-link">
            <i class="ph ph-caret-left"></i> Back
        </a>
        <div class="now-playing">Now Playing</div>
        <div style="width: 50px;"></div> <!-- Spacer -->
    </nav>

    <div class="player-wrapper">
        <div class="media-container">
            {% if media_type == 'video' %}
                <video class="cinematic-media" controls autoplay name="media">
                    <source src="/stream/{{ filename }}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            {% elif media_type == 'image' %}
                <img class="cinematic-media" src="/stream/{{ filename }}" alt="{{ filename }}">
            {% elif media_type == 'audio' %}
                <div class="audio-player-card">
                    <div class="cover-art-placeholder">
                        <i class="ph ph-music-notes"></i>
                    </div>
                    <audio controls autoplay name="media" class="custom-audio">
                        <source src="/stream/{{ filename }}" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                </div>
            {% else %}
                <div class="unsupported-card">
                    <i class="ph ph-warning-circle"></i>
                    <p>Format not supported for cinematic playback.</p>
                </div>
            {% endif %}
        </div>
        
        <div class="media-info">
            <h1 class="media-title">{{ filename }}</h1>
            <p class="media-meta">Local Network Stream • Premium Quality</p>
        </div>
    </div>

</body>
</html>
