<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalWeb</title>
    <!-- Google Fonts for typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Phosphor Icons for smooth minimal icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="background-nebula"></div>
    <div class="container">
        <header class="glass-header">
            <h1><i class="ph ph-planet"></i> LocalWeb</h1>
            <p>Your local network playground for all files</p>
        </header>

        <main>
            <div id="loading" class="loading-state">
                <i class="ph ph-spinner-gap spin"></i>
                <p>Scanning subspace anomalies...</p>
            </div>
            
            <div id="media-grid" class="media-grid hidden">
                <!-- Media cards will be injected here via JS -->
            </div>
            
            <div id="empty-state" class="empty-state hidden">
                <i class="ph ph-files"></i>
                <p>No files discovered. Drop any files (`.mp4`, `.pdf`, `.jpg`, `.zip`) into the `media/` folder on the host machine.</p>
            </div>
        </main>
        
        <footer class="glass-footer">
            <p>Running locally on your network.</p>
            <button id="refresh-btn" class="glass-button" onclick="loadMedia()">
                <i class="ph ph-arrows-clockwise"></i> Refresh Scan
            </button>
        </footer>
    </div>

    <!-- Main Script -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
